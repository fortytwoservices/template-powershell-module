name: Run Windows Pester tests on Pull Requests

on:
  pull_request:

jobs:
  build-image:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 2
    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ vars.FORTYTWO_INTERNAL_POWERSHELL_PUSH_CLIENTID }}
        tenant-id: ${{ vars.FORTYTWO_MANAGED_SERVICE_TENANTID }}
        allow-no-subscriptions: true
        enable-AzPSSession: true # Injects authentication into Az PowerShell module
    - name: Pester tests
      shell: pwsh
      run: |
        Write-Host "Registering repository"
        Register-PSResourceRepository -Name FortytwoInternal -Uri "${{ vars.FORTYTWO_INTERNAL_POWERSHELL_REPOSITORY }}" -Trusted -Priority 1
        Set-PSResourceRepository -Name PSGallery -Trusted:$true
        Get-ChildItem -Recurse -Include *.psd1 | Import-PowerShellDataFile | Where-Object RequiredModules | Select-Object -ExpandProperty RequiredModules | Sort-Object -Unique | ForEach-Object {Install-PSResource -Scope CurrentUser -Confirm:$false -Name $_}
        Invoke-Pester -ExcludeTagFilter "LinuxOnly"
      env:
        PESTERSECRET1: ${{ secrets.PESTERSECRET1 }}
        PESTERSECRET2: ${{ secrets.PESTERSECRET2 }}
        PESTERSECRET3: ${{ secrets.PESTERSECRET3 }}
        PESTERSECRET4: ${{ secrets.PESTERSECRET4 }}
        PESTERSECRET5: ${{ secrets.PESTERSECRET5 }}
        PESTERSECRET6: ${{ secrets.PESTERSECRET6 }}
        PESTERSECRET7: ${{ secrets.PESTERSECRET7 }}
        PESTERSECRET8: ${{ secrets.PESTERSECRET8 }}
        PESTERSECRET9: ${{ secrets.PESTERSECRET9 }}
        PESTERSECRET10: ${{ secrets.PESTERSECRET10 }}
        PESTERSECRET11: ${{ secrets.PESTERSECRET11 }}
        PESTERSECRET12: ${{ secrets.PESTERSECRET12 }}
        PESTERSECRET13: ${{ secrets.PESTERSECRET13 }}
        PESTERSECRET14: ${{ secrets.PESTERSECRET14 }}
        PESTERSECRET15: ${{ secrets.PESTERSECRET15 }}
        PESTERSECRET16: ${{ secrets.PESTERSECRET16 }}
        PESTERSECRET17: ${{ secrets.PESTERSECRET17 }}
        PESTERSECRET18: ${{ secrets.PESTERSECRET18 }}
        PESTERSECRET19: ${{ secrets.PESTERSECRET19 }}